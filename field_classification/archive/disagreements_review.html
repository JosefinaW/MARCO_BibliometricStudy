<script>
const DATA = [{"doi":"10.1126/science.1238041","title":"Poverty Impedes Cognitive Function","abstract":"The poor often behave in less capable ways, which can further perpetuate poverty. We hypothesize that poverty directly impedes cognitive function and present two studies that test this hypothesis. First, we experimentally induced thoughts about finances and found that this reduces cognitive performance among poor but not in well-off participants. Second, we examined the cognitive function of farmers over the planting cycle. We found that the same farmer shows diminished cognitive performance before harvest, when poor, as compared with after harvest, when rich. This cannot be explained by differences in time available, nutrition, or work effort. Nor can it be explained with stress: Although farmers do show more stress before harvest, that does not account for diminished cognitive performance. Instead, it appears that poverty itself reduces cognitive capacity. We suggest that this is because poverty-related concerns consume mental resources, leaving less for other tasks. These data provide a previously unexamined perspective and help explain a spectrum of behaviors among the poor. We discuss some implications for poverty policy.","source_display_name":"Science","manual":"economics_business","gpt":"psychology","gemini":"psychology","manual_label":"Economics & Business","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1073/pnas.1701916114","title":"Belief in free will affects causal attributions when judging others' behavior","abstract":"Free will is a cornerstone of our society, and psychological research demonstrates that questioning its existence impacts social behavior. In six studies, we tested whether believing in free will is related to the correspondence bias, which reflects people's automatic tendency to overestimate the influence of internal as compared to external factors when interpreting others' behavior. All studies demonstrate a positive relationship between the strength of the belief in free will and the correspondence bias. Moreover, in two experimental studies, we showed that weakening participants' belief in free will leads to a reduction of the correspondence bias. Finally, the last study demonstrates that believing in free will predicts prescribed punishment and reward behavior, and that this relation is mediated by the correspondence bias. Overall, these studies show that believing in free will impacts fundamental social-cognitive processes that are involved in the understanding of others' behavior.","source_display_name":"Proceedings of the National Academy of Sciences","manual":"philosophy","gpt":"psychology","gemini":"psychology","manual_label":"Philosophy","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1126/science.1191465","title":"Why Testing Improves Memory: Mediator Effectiveness Hypothesis","abstract":"A wealth of research has established that practice tests improve memory for the tested material. Although the benefits of practice tests are well documented, the mechanisms underlying testing effects are not well understood. We propose the mediator effectiveness hypothesis, which states that more-effective mediators (that is, information linking cues to targets) are generated during practice involving tests with restudy versus during restudy only. Effective mediators must be retrievable at time of test and must elicit the target response. We evaluated these two components of mediator effectiveness for learning foreign language translations during practice involving either test-restudy or restudy only. Supporting the mediator effectiveness hypothesis, test-restudy practice resulted in mediators that were more likely to be retrieved and more likely to elicit targets on a final test.","source_display_name":"Science","manual":"education","gpt":"psychology","gemini":"psychology","manual_label":"Education","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1126/science.1222426","title":"Some Consequences of Having Too Little","abstract":"Poor individuals often engage in behaviors, such as excessive borrowing, that reinforce the conditions of poverty. Some explanations for these behaviors focus on personality traits of the poor. Others emphasize environmental factors such as housing or financial access. We instead consider how certain behaviors stem simply from having less. We suggest that scarcity changes how people allocate attention: It leads them to engage more deeply in some problems while neglecting others. Across several experiments, we show that scarcity leads to attentional shifts that can help to explain behaviors such as overborrowing. We discuss how this mechanism might also explain other puzzles of poverty.","source_display_name":"Science","manual":"economics_business","gpt":"psychology","gemini":"psychology","manual_label":"Economics & Business","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1073/pnas.1610834113","title":"Past-focused environmental comparisons promote proenvironmental outcomes for conservatives","abstract":"Conservatives appear more skeptical about climate change and global warming and less willing to act against it than liberals. We propose that this unwillingness could result from fundamental differences in conservatives' and liberals' temporal focus. Conservatives tend to focus more on the past than do liberals. Across six studies, we rely on this notion to demonstrate that conservatives are positively affected by past- but not by future-focused environmental comparisons. Past comparisons largely eliminated the political divide that separated liberal and conservative respondents' attitudes toward and behavior regarding climate change, so that across these studies conservatives and liberals were nearly equally likely to fight climate change. This research demonstrates how psychological processes, such as temporal comparison, underlie the prevalent ideological gap in addressing climate change. It opens up a promising avenue to convince conservatives effectively of the need to address climate change and global warming.","source_display_name":"Proceedings of the National Academy of Sciences","manual":"political_science","gpt":"psychology","gemini":"psychology","manual_label":"Political Science","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1126/science.1199427","title":"Writing About Testing Worries Boosts Exam Performance in the Classroom","abstract":"Two laboratory and two randomized field experiments tested a psychological intervention designed to improve students' scores on high-stakes exams and to increase our understanding of why pressure-filled exam situations undermine some students' performance. We expected that sitting for an important exam leads to worries about the situation and its consequences that undermine test performance. We tested whether having students write down their thoughts about an upcoming test could improve test performance. The intervention, a brief expressive writing assignment that occurred immediately before taking an important test, significantly improved students' exam scores, especially for students habitually anxious about test taking. Simply writing about one's worries before a high-stakes exam can boost test scores.","source_display_name":"Science","manual":"education","gpt":"psychology","gemini":"psychology","manual_label":"Education","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1073/pnas.1706253114","title":"Exposure to rising inequality shapes Americans' opportunity beliefs and policy support","abstract":"Economic inequality has been on the rise in the United States since the 1980s and by some measures stands at levels not seen since before the Great Depression. Although the strikingly high and rising level of economic inequality in the nation has alarmed scholars, pundits, and elected officials alike, research across the social sciences repeatedly concludes that Americans are largely unconcerned about it. Considerable research has documented, for instance, the important role of psychological processes, such as system justification and American Dream ideology, in engendering Americans' relative insensitivity to economic inequality. The present work offers, and reports experimental tests of, a different perspective-the opportunity model of beliefs about economic inequality. Specifically, two convenience samples (study 1, n = 480; and study 2, n = 1,305) and one representative sample (study 3, n = 1,501) of American adults were exposed to information about rising economic inequality in the United States (or control information) and then asked about their beliefs regarding the roles of structural (e.g., being born wealthy) and individual (e.g., hard work) factors in getting ahead in society (i.e., opportunity beliefs). They then responded to policy questions regarding the roles of business and government actors in reducing economic inequality. Rather than revealing insensitivity to rising inequality, the results suggest that rising economic inequality in contemporary society can spark skepticism about the existence of economic opportunity in society that, in turn, may motivate support for policies designed to redress economic inequality.","source_display_name":"Proceedings of the National Academy of Sciences","manual":"economics_business","gpt":"psychology","gemini":"psychology","manual_label":"Economics & Business","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1073/pnas.1722664115","title":"Social learning and partisan bias in the interpretation of climate trends","abstract":"Vital scientific communications are frequently misinterpreted by the lay public as a result of motivated reasoning, where people misconstrue data to fit their political and psychological biases. In the case of climate change, some people have been found to systematically misinterpret climate data in ways that conflict with the intended message of climate scientists. While prior studies have attempted to reduce motivated reasoning through bipartisan communication networks, these networks have also been found to exacerbate bias. Popular theories hold that bipartisan networks amplify bias by exposing people to opposing beliefs. These theories are in tension with collective intelligence research, which shows that exchanging beliefs in social networks can facilitate social learning, thereby improving individual and group judgments. However, prior experiments in collective intelligence have relied almost exclusively on neutral questions that do not engage motivated reasoning. Using Amazon's Mechanical Turk, we conducted an online experiment to test how bipartisan social networks can influence subjects' interpretation of climate communications from NASA. Here, we show that exposure to opposing beliefs in structured bipartisan social networks substantially improved the accuracy of judgments among both conservatives and liberals, eliminating belief polarization. However, we also find that social learning can be reduced, and belief polarization maintained, as a result of partisan priming. We find that increasing the salience of partisanship during communication, both through exposure to the logos of political parties and through exposure to the political identities of network peers, can significantly reduce social learning.","source_display_name":"Proceedings of the National Academy of Sciences","manual":"political_science","gpt":"psychology","gemini":"psychology","manual_label":"Political Science","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1163/156853706776931222","title":"The Folk Concepts of Intention and Intentional Action: A Cross-Cultural Study","abstract":"Abstract Recent studies point to a surprising divergence between people's use of the concept of intention and their use of the concept of acting intentionally. It seems that people's application of the concept of intention is determined by their beliefs about the agent's psychological states whereas their use of the concept of acting intentionally is determined at least in part by their beliefs about the moral status of the behavior itself (i.e., by their beliefs about whether the behavior is morally good or morally bad). These findings raise a number of difficult questions about the relationship between the concept of intention and the concept of acting intentionally. The present paper addresses those questions using a variety of different methods, including conceptual analysis, psychological experimentation, and an examination of people's use of certain expressions in other languages.","source_display_name":"Journal of Cognition and Culture","manual":"psychology","gpt":"psychology","gemini":"philosophy","manual_label":"Psychology","gpt_label":"Psychology","gemini_label":"Philosophy"},{"doi":"10.1073/pnas.2014505117","title":"The logic of universalization guides moral judgment","abstract":"To explain why an action is wrong, we sometimes say, \"What if everybody did that?\" In other words, even if a single person's behavior is harmless, that behavior may be wrong if it would be harmful once universalized. We formalize the process of universalization in a computational model, test its quantitative predictions in studies of human moral judgment, and distinguish it from alternative models. We show that adults spontaneously make moral judgments consistent with the logic of universalization, and report comparable patterns of judgment in children. We conclude that, alongside other well-characterized mechanisms of moral judgment, such as outcome-based and rule-based thinking, the logic of universalizing holds an important place in our moral minds.","source_display_name":"Proceedings of the National Academy of Sciences","manual":"philosophy","gpt":"psychology","gemini":"psychology","manual_label":"Philosophy","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1073/pnas.1517662112","title":"Conservatives negatively evaluate counterstereotypical people to maintain a sense of certainty","abstract":"Significance People often evaluate others in a negative manner when they do not fit the stereotypes that are generally believed about their group. Here, we not only show that political conservatives are more likely to negatively evaluate people who deviate from stereotypes than are liberals, but also explain why. Previous research has heavily emphasized that people endorse stereotypes because they hold negative attitudes toward members of minority groups and because doing so helps to maintain the current structure of society. In contrast to these perspectives, we demonstrate that conservatives negatively evaluate and economically penalize people who deviate from stereotypes because those stereotypes help them to efficiently categorize people into groups, which provides a greater sense of certainty about the world.","source_display_name":"Proceedings of the National Academy of Sciences","manual":"political_science","gpt":"psychology","gemini":"psychology","manual_label":"Political Science","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1073/pnas.1516047113","title":"Racial bias in pain assessment and treatment recommendations, and false beliefs about biological differences between blacks and whites","abstract":"Black Americans are systematically undertreated for pain relative to white Americans. We examine whether this racial bias is related to false beliefs about biological differences between blacks and whites (e.g., \"black people's skin is thicker than white people's skin\"). Study 1 documented these beliefs among white laypersons and revealed that participants who more strongly endorsed false beliefs about biological differences reported lower pain ratings for a black (vs. white) target. Study 2 extended these findings to the medical context and found that half of a sample of white medical students and residents endorsed these beliefs. Moreover, participants who endorsed these beliefs rated the black (vs. white) patient's pain as lower and made less accurate treatment recommendations. Participants who did not endorse these beliefs rated the black (vs. white) patient's pain as higher, but showed no bias in treatment recommendations. These findings suggest that individuals with at least some medical training hold and may use false beliefs about biological differences between blacks and whites to inform medical judgments, which may contribute to racial disparities in pain assessment and treatment.","source_display_name":"Proceedings of the National Academy of Sciences","manual":"human_medicine","gpt":"psychology","gemini":"psychology","manual_label":"Human Medicine","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1111/j.1468-0017.2006.00297.x","title":"A Dissociation Between Moral Judgments and Justifications","abstract":"Abstract: To what extent do moral judgments depend on conscious reasoning from explicitly understood principles? We address this question by investigating one particular moral principle, the principle of the double effect. Using web-based technology, we collected a large data set on individuals' responses to a series of moral dilemmas, asking when harm to innocent others is permissible. Each moral dilemma presented a choice between action and inaction, both resulting in lives saved and lives lost. Results showed that: (1) patterns of moral judgments were consistent with the principle of double effect and showed little variation across differences in gender, age, educational level, ethnicity, religion or national affiliation (within the limited range of our sample population) and (2) a majority of subjects failed to provide justifications that could account for their judgments. These results indicate that the principle of the double effect may be operative in our moral judgments but not open to conscious introspection. We discuss these results in light of current psychological theories of moral cognition, emphasizing the need to consider the unconscious appraisal system that mentally represents the causal and intentional properties of human action.","source_display_name":"Mind & Language","manual":"philosophy","gpt":"psychology","gemini":"psychology","manual_label":"Philosophy","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1073/pnas.1707719114","title":"Americans misperceive racial economic equality","abstract":"The present research documents the widespread misperception of race-based economic equality in the United States. Across four studies (n = 1,377) sampling White and Black Americans from the top and bottom of the national income distribution, participants overestimated progress toward Black-White economic equality, largely driven by estimates of greater current equality than actually exists according to national statistics. Overestimates of current levels of racial economic equality, on average, outstripped reality by roughly 25% and were predicted by greater belief in a just world and social network racial diversity (among Black participants). Whereas high-income White respondents tended to overestimate racial economic equality in the past, Black respondents, on average, underestimated the degree of past racial economic equality. Two follow-up experiments further revealed that making societal racial discrimination salient increased the accuracy of Whites' estimates of Black-White economic equality, whereas encouraging Whites to anchor their estimates on their own circumstances increased their tendency to overestimate current racial economic equality. Overall, these findings suggest a profound misperception of and unfounded optimism regarding societal race-based economic equality-a misperception that is likely to have any number of important policy implications.","source_display_name":"Proceedings of the National Academy of Sciences","manual":"economics_business","gpt":"psychology","gemini":"psychology","manual_label":"Economics & Business","gpt_label":"Psychology","gemini_label":"Psychology"},{"doi":"10.1073/pnas.1505067112","title":"Selfish third parties act as peacemakers by transforming conflicts and promoting cooperation","abstract":"The tremendous costs of conflict have made humans resourceful not only at warfare but also at peacemaking. Although third parties have acted as peacemakers since the dawn of history, little is known about voluntary, informal third-party intervention in conflict. Here we introduce the Peacemaker Game, a novel experimental paradigm, to model and study the interdependence between disputants and third parties in conflict. In the game, two disputants choose whether to cooperate or compete and a third party chooses whether or not to intervene in the conflict. Intervention introduces side payments that transform the game disputants are playing; it also introduces risk for the third party by making it vulnerable to disputants' choices. Six experiments revealed three robust effects: (i) The mere possibility of third-party intervention significantly increases cooperation in interpersonal and intergroup conflicts; (ii) reducing the risk to third parties dramatically increases intervention rates, to everyone's benefit; and (iii) disputants' cooperation rates are consistently higher than third parties' intervention rates. These findings explain why, how, and when self-interested third parties facilitate peaceful conflict resolution.","source_display_name":"Proceedings of the National Academy of Sciences","manual":"psychology","gpt":"psychology","gemini":"economics_business","manual_label":"Psychology","gpt_label":"Psychology","gemini_label":"Economics & Business"},{"doi":"10.1080/0951508042000202354","title":"After objectivity: an empirical study of moral judgment","abstract":"Abstract This paper develops an empirical argument that the rejection of moral objectivity leaves important features of moral judgment intact. In each of five reported experiments, a number of participants endorsed a nonobjectivist claim about a canonical moral violation. In four of these experiments, participants were also given a standard measure of moral judgment, the moral/conventional task. In all four studies, participants who respond as nonobjectivists about canonical moral violations still treat such violations in typical ways on the moral/conventional task. In particular, participants who give moral nonobjectivist responses still draw a clear distinction between canonical moral and conventional violations. Thus there is some reason to think that many of the central characteristics of moral judgment are preserved in the absence of a commitment to moral objectivity.","source_display_name":"Philosophical Psychology","manual":"philosophy","gpt":"psychology","gemini":"philosophy","manual_label":"Philosophy","gpt_label":"Psychology","gemini_label":"Philosophy"},{"doi":"10.1145/3105726.3106182","title":"Investigating Static Analysis Errors in Student Java Programs","abstract":"Research on students learning to program has produced studies on both compile-time errors (syntax errors) and run-time errors (exceptions). Both of these types of errors are natural targets, since detection is built into the programming language. In this paper, we present an empirical investigation of static analysis errors present in syntactically correct code. Static analysis errors can be revealed by tools that examine a program's source code, but this error detection is typically not built into common programming languages and instead requires separate tools. We study nearly 10 million static analysis errors found in over 500 thousand program submissions made by students over a five-semester period. The study includes data from four separate courses, including a non-majors introductory course as well as the CS1/CS2/CS3 sequence for CS majors.","source_display_name":"N/A","manual":"education","gpt":"education","gemini":"computer_science","manual_label":"Education","gpt_label":"Education","gemini_label":"Computer Science"},{"doi":"10.1111/lang.12161","title":"The Role of Inhibitory Control in Second Language Phonological Processing","abstract":"Abstract This study investigated the role of inhibition in second language (L2) learners' phonological processing. Participants were Spanish learners of L2 English and American learners of L2 Spanish. We measured inhibition through a retrieval-induced inhibition task. Accuracy of phonological representations (perception and production) was assessed through a speeded ABX categorization task and a delayed sentence repetition task. We used a measure of L2 vocabulary size to tease out L2 proficiency effects. Higher inhibitory control was related to lower error rate in segmental perception. Inhibition was also related to consonant but not to vowel production accuracy.","source_display_name":"Language Learning","manual":"education","gpt":"general_comparative_literature_linguistics","gemini":"general_comparative_literature_linguistics","manual_label":"Education","gpt_label":"General & Comparative Literature and Linguistics","gemini_label":"General & Comparative Literature and Linguistics"},{"doi":"10.1257/aer.101.7.3109","title":"Happiness and Time Preference: The Effect of Positive Affect in a Random-Assignment Experiment","abstract":"We conduct a random-assignment experiment to investigate whether positive affect impacts time preference, where time preference denotes a preference for present over future utility. Our result indicates that, compared to neutral affect, mild positive affect significantly reduces time preference over money. This result is robust to various specification checks, and alternative interpretations of the result are considered. Our result has implications for the effect of happiness on time preference and the role of emotions in economic decision making, in general.","source_display_name":"American Economic Review","manual":"education","gpt":"economics_business","gemini":"economics_business","manual_label":"Education","gpt_label":"Economics & Business","gemini_label":"Economics & Business"},{"doi":"10.1073/pnas.1601280113","title":"Uncalculating cooperation is used to signal trustworthiness","abstract":"Humans frequently cooperate without carefully weighing the costs and benefits. As a result, people may wind up cooperating when it is not worthwhile to do so. Why risk making costly mistakes? Here, we present experimental evidence that reputation concerns provide an answer: people cooperate in an uncalculating way to signal their trustworthiness to observers. We present two economic game experiments in which uncalculating versus calculating decision-making is operationalized by either a subject's choice of whether to reveal the precise costs of cooperating (Exp. 1) or the time a subject spends considering these costs (Exp. 2).","source_display_name":"Proceedings of the National Academy of Sciences","manual":"psychology","gpt":"economics_business","gemini":"psychology","manual_label":"Psychology","gpt_label":"Economics & Business","gemini_label":"Psychology"},{"doi":"10.1073/pnas.1616921114","title":"Demotivating incentives and motivation crowding out in charitable giving","abstract":"Research has shown that extrinsic incentives can crowd out intrinsic motivation in many contexts. Despite this, many nonprofits offer conditional thank-you gifts, such as mugs or tote bags, in exchange for donations. In collaboration with a nonprofit, this study implements a direct mail field experiment and demonstrates that thank-you gifts reduced donation rates in a fundraising campaign.","source_display_name":"Proceedings of the National Academy of Sciences","manual":"psychology","gpt":"economics_business","gemini":"economics_business","manual_label":"Psychology","gpt_label":"Economics & Business","gemini_label":"Economics & Business"},{"doi":"10.1080/09515089.2014.894431","title":"Motivational internalism and folk intuitions","abstract":"Motivational internalism postulates a necessary connection between moral judgments and motivation. In arguing for and against internalism, metaethicists traditionally appeal to intuitions about cases, but crucial cases often yield conflicting intuitions. One way to try to make progress, possibly uncovering theoretical bias and revealing whether people have conceptions of moral judgments required for noncognitivist accounts of moral disagreement, is to investigate non-philosophers' willingness to attribute moral judgments.","source_display_name":"Philosophical Psychology","manual":"psychology","gpt":"philosophy","gemini":"philosophy","manual_label":"Psychology","gpt_label":"Philosophy","gemini_label":"Philosophy"},{"doi":"10.1086/268936","title":"Response Scales: Effects of Category Range on Reported Behavior and Comparative Judgments","abstract":"Effects of the range of response categories provided in a closed answer format on behavioral reports and subsequent judgments were explored. Respondents reported their daily use of television along a scale that either ranged from \u201cup to a half hour\u201d \u201cto more than two and a half hours\u201d or ranged from \u201cup to two and a half hours\u201d to \u201cmore than four and a half hours.\u201d","source_display_name":"Public Opinion Quarterly","manual":"sociology_social_sciences","gpt":"political_science","gemini":"psychology","manual_label":"Sociology & Social Sciences","gpt_label":"Political Science","gemini_label":"Psychology"},{"doi":"10.1002/pam.21702","title":"An Experimental Test of the Expectancy-Disconfirmation Theory of Citizen Satisfaction","abstract":"A number of prior studies have found evidence for the expectancy-disconfirmation theory of citizen satisfaction with public services, which holds that citizens judge public services not only on experienced service quality but also on an implicit comparison of service quality with prior expectations. This study aimed to test the theory using an experimental method with 964 participants in an online survey experiment.","source_display_name":"Journal of Policy Analysis and Management","manual":"political_science","gpt":"public_administration","gemini":"public_administration","manual_label":"Political Science","gpt_label":"Public Administration","gemini_label":"Public Administration"},{"doi":"10.1075/resla.17019.loz","title":"Using learner corpus methods in L2 acquisition research","abstract":"Abstract Since the 1970s, findings from Morpheme Order Studies (MOS) have suggested that the emergence of morphemes follows a predictable order in L2 English. In this paper we show how the tools and practices in Learner Corpus Research (LCR) offer a richer descriptive basis, which is achieved with Interlanguage Annotation (ILA), a manual, fined-grained, purpose-oriented type of annotation.","source_display_name":"Revista Espa\u00f1ola de Ling\u00fc\u00edstica Aplicada","manual":"education","gpt":"general_comparative_literature_linguistics","gemini":"general_comparative_literature_linguistics","manual_label":"Education","gpt_label":"General & Comparative Literature and Linguistics","gemini_label":"General & Comparative Literature and Linguistics"},{"doi":"10.1038/s41467-018-06785-y","title":"Dopamine-dependent prefrontal reactivations explain long-term benefit of fear extinction","abstract":"Fear extinction does not prevent post-traumatic stress or have long-term therapeutic benefits in fear-related disorders unless extinction memories are easily retrieved at later encounters with the once-threatening stimulus. Previous research in rodents has pointed towards a role for spontaneous prefrontal activity occurring after extinction learning in stabilizing and consolidating extinction memories.","source_display_name":"Nature Communications","manual":"human_medicine","gpt":"biology","gemini":"psychology","manual_label":"Human Medicine","gpt_label":"Biology","gemini_label":"Psychology"},{"doi":"10.1073/pnas.1606574113","title":"When fairness matters less than we expect","abstract":"Do those who allocate resources know how much fairness will matter to those who receive them? Across seven studies, allocators used either a fair or unfair procedure to determine which of two receivers would receive the most money. Allocators consistently overestimated the impact that the fairness of the allocation procedure would have on the happiness of receivers.","source_display_name":"Proceedings of the National Academy of Sciences","manual":"economics_business","gpt":"economics_business","gemini":"psychology","manual_label":"Economics & Business","gpt_label":"Economics & Business","gemini_label":"Psychology"},{"doi":"10.1073/pnas.1704032114","title":"Evolution of flexibility and rigidity in retaliatory punishment","abstract":"Natural selection designs some social behaviors to depend on flexible learning processes, whereas others are relatively rigid or reflexive. What determines the balance between these two approaches? We offer a detailed case study in the context of a two-player game with antisocial behavior and retaliatory punishment.","source_display_name":"Proceedings of the National Academy of Sciences","manual":"psychology","gpt":"biology","gemini":"psychology","manual_label":"Psychology","gpt_label":"Biology","gemini_label":"Psychology"},{"doi":"10.1177/0267658310386439","title":"L3 syntactic transfer selectivity and typological determinacy: The typological primacy model","abstract":"The present article addresses the following question: what variables condition syntactic transfer? Evidence is provided in support of the position that third language (L3) transfer is selective, whereby, at least under certain conditions, it is driven by the typological proximity of the target L3 measured against the other previously acquired linguistic systems.","source_display_name":"Second language Research","manual":"education","gpt":"general_comparative_literature_linguistics","gemini":"general_comparative_literature_linguistics","manual_label":"Education","gpt_label":"General & Comparative Literature and Linguistics","gemini_label":"General & Comparative Literature and Linguistics"},{"doi":"10.1086/269239","title":"Assimilation and Contrast Effects in Part-Whole Question Sequences: A Conversational Logic Analysis","abstract":"A theoretical model of the emergence of assimilation and contrast effects in part-whole question sequences is presented. When one specific question precedes a general question and the two are not assigned to the same conversational context, respondents use the information primed by the specific question to form the general judgment.","source_display_name":"Public Opinion Quarterly","manual":"sociology_social_sciences","gpt":"political_science","gemini":"psychology","manual_label":"Sociology & Social Sciences","gpt_label":"Political Science","gemini_label":"Psychology"}];

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function getDisagreementType(d) {
  const all3 = d.manual !== d.gpt && d.manual !== d.gemini && d.gpt !== d.gemini;
  if (all3) return 'three-way';
  if (d.gpt === d.gemini && d.manual !== d.gpt) return 'manual-outlier';
  if (d.manual === d.gemini && d.gpt !== d.manual) return 'gpt-outlier';
  if (d.manual === d.gpt && d.gemini !== d.manual) return 'gemini-outlier';
  return 'other';
}

function getRaterClass(rater, d) {
  const vals = [d.manual, d.gpt, d.gemini];
  const thisVal = d[rater];
  const others = vals.filter(v => v === thisVal).length;
  if (others === 3) return 'agree';
  if (others === 2) return 'agree';
  if (others === 1) return 'lone-disagree';
  return 'disagree';
}

function render(filter, search) {
  let items = DATA.map(d => ({...d, type: getDisagreementType(d)}));
  if (filter !== 'all') items = items.filter(d => d.type === filter);
  if (search) {
    const q = search.toLowerCase();
    items = items.filter(d =>
      d.title.toLowerCase().includes(q) ||
      d.manual_label.toLowerCase().includes(q) ||
      d.gpt_label.toLowerCase().includes(q) ||
      d.gemini_label.toLowerCase().includes(q) ||
      (d.source_display_name || '').toLowerCase().includes(q)
    );
  }

  const counts = {total: items.length, 'manual-outlier': 0, 'gpt-outlier': 0, 'gemini-outlier': 0, 'three-way': 0};
  items.forEach(d => { if (counts[d.type] !== undefined) counts[d.type]++; });

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="label">Disagreements shown</div><div class="value">${counts.total}</div></div>
    <div class="stat-card"><div class="label">Manual is outlier</div><div class="value">${counts['manual-outlier']}</div></div>
    <div class="stat-card"><div class="label">gpt-oss is outlier</div><div class="value">${counts['gpt-outlier']}</div></div>
    <div class="stat-card"><div class="label">Gemini is outlier</div><div class="value">${counts['gemini-outlier']}</div></div>
    <div class="stat-card"><div class="label">All three differ</div><div class="value">${counts['three-way']}</div></div>
  `;

  document.getElementById('cards').innerHTML = items.map(d => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${esc(d.title)}</div>
        <div class="card-journal">${esc(d.source_display_name || 'N/A')}</div>
      </div>
      <div class="card-doi">DOI: ${esc(d.doi)}</div>
      <div class="card-abstract" onclick="this.classList.toggle('expanded')">${esc(d.abstract)}</div>
      <div class="expand-hint" onclick="this.previousElementSibling.classList.toggle('expanded')">Click to expand/collapse abstract</div>
      <div class="classifications">
        <div class="rater ${getRaterClass('manual', d)}">
          <div class="rater-name">Manual</div>
          <div class="rater-value">${esc(d.manual_label)}</div>
        </div>
        <div class="rater ${getRaterClass('gpt', d)}">
          <div class="rater-name">gpt-oss-120b</div>
          <div class="rater-value">${esc(d.gpt_label)}</div>
        </div>
        <div class="rater ${getRaterClass('gemini', d)}">
          <div class="rater-name">Gemini 3.1 Pro</div>
          <div class="rater-value">${esc(d.gemini_label)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

document.getElementById('filter-rater').addEventListener('change', function() {
  render(this.value, document.getElementById('filter-search').value);
});
document.getElementById('filter-search').addEventListener('input', function() {
  render(document.getElementById('filter-rater').value, this.value);
});

render('all', '');
</script>
